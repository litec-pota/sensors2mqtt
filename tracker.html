<html encoding="utf-8" manifest="/doesnt-exist.appcache">
<head>
    <title>{b} :: SensorData -> MQTT</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="distribution" content="GLOBAL" />
    <meta name="rating" content="General" />
    <meta name="author" content="Guenther Hutter">
    <meta name="author" content="bytebang e.U." />
    <meta name="description" content="Transmit your position via MQTT">
    <meta name="keywords" content="IoT,MQTT,GPS,Position,geolocation" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js" type="text/javascript"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" type="text/javascript"></script>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/3.3.3/adapter.min.js"></script>

    <style>
        body { background: #F5F5F5; margin: 5%; }
        label { color: #2D7B93; font-weight: bold; }
        h1 { color: #a6a6a6; }
        .hspacer { width: 40px; }
        /* Highlight the sensor button for iOS users */
        #sensorPermissionButton { margin-bottom: 15px; }
    </style>

    <script type="text/javascript">
        var client = null;
        var connected = false;
        var accel = {x:0, y:0, z:0};
        var orient = {alpha:0, beta:0, gamma:0};
        var position = {latitude:0, longitude:0};
        var sendTimer = null;

        // --- HELPERS ---
        function urlParamOrDefault(name, defaultvalue) {
            var results = new RegExp('[\?&]' + name + '=([^&#]*)').exec(window.location.href);
            return (results == null) ? defaultvalue : decodeURI(results[1]) || 0;
        }

        function roundDigits(value, digits) {
            var scale = Math.pow(10, digits);
            return Math.round(value * scale) / scale;
        }

        // --- SENSOR PERMISSION LOGIC (iOS Fix) ---
        function requestSensorPermission() {
            // Check if it's iOS 13+
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') {
                            initSensors();
                            $("#sensorPermissionButton").addClass("btn-success").text("Sensors Active");
                        } else {
                            alert("Permission denied for Sensors");
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS or older devices
                initSensors();
                $("#sensorPermissionButton").hide(); 
            }
        }

        function initSensors() {
            window.addEventListener("devicemotion", updateAcceleration, true);
            window.addEventListener("deviceorientation", updateOrientation, true);
            console.log("Sensors initialized");
        }

        function updateAcceleration(event) {
            if (event.accelerationIncludingGravity) {
                accel.x = roundDigits(event.accelerationIncludingGravity.x, 2);
                accel.y = roundDigits(event.accelerationIncludingGravity.y, 2);
                accel.z = roundDigits(event.accelerationIncludingGravity.z, 2);
            }
        }

        function updateOrientation(event) {
            orient.alpha = roundDigits(event.alpha, 2);
            orient.beta = roundDigits(event.beta, 2);
            orient.gamma = roundDigits(event.gamma, 2);
        }

        function updatePosition(event) {
            position.latitude = event.coords.latitude;
            position.longitude = event.coords.longitude;
        }

        // --- MQTT LOGIC ---
        function onMqttConnectionEstablished() {
            connected = true;
            $("#connectbutton").text("Disconnect");
            lockdownMQTTGuiControls(true);
            client.subscribe($("#topicInput").val());
            $("#latestLog").val(new Date().toISOString() + " -> Connection established");
        }

        function onMqttConnectionLost(responseObject) {
            connected = false;
            $("#connectbutton").text("Connect");
            lockdownMQTTGuiControls(false);
            if (responseObject.errorCode !== 0) console.log("Lost: " + responseObject.errorMessage);
        }

        function onMqttMessageArrived(message) {
            $("#latestLog").val(new Date().toISOString() + " Receiving -> " + message.payloadString);
        }

        function connectToMqttBroker() {
            var hostname = $("#hostInput").val();
            var port = $("#portInput").val();
            var clientId = $("#clientIdInput").val();
            var tls = $("#tlsInput").is(':checked');

            client = new Paho.MQTT.Client(hostname, Number(port), clientId);
            client.onConnectionLost = onMqttConnectionLost;
            client.onMessageArrived = onMqttMessageArrived;

            var options = {
                timeout: Number($("#timeoutInput").val()),
                keepAliveInterval: Number($("#keepAliveInput").val()),
                cleanSession: $("#cleanSessionInput").is(':checked'),
                useSSL: tls,
                onSuccess: onMqttConnectionEstablished,
                onFailure: function() { $("#latestLog").val("Connection failed"); }
            };

            if ($("#userInput").val().length > 0) options.userName = $("#userInput").val();
            if ($("#passInput").val().length > 0) options.password = $("#passInput").val();

            client.connect(options);
        }

        function disconnectFromMqttBroker() {
            client.disconnect();
        }

        function lockdownMQTTGuiControls(tgtstate) {
            $("input").not("#sendAccelerationData, #sendOrientationData, #sendGpsData, #sendInterval").prop('disabled', tgtstate);
        }

        function setSendInterval() {
            var interval = $("#sendInterval").val();
            $("#sendIntervalValue").html(interval);
            if (sendTimer != null) clearInterval(sendTimer);
            sendTimer = setInterval(sendAndShowData, interval);
        }

        function sendAndShowData() {
            var data = {};
            if ($("#sendAccelerationData").is(':checked')) data.acceleration = accel;
            if ($("#sendOrientationData").is(':checked')) data.orientation = orient;
            if ($("#sendGpsData").is(':checked')) data.position = position;

            var dataString = JSON.stringify(data);
            $("#latestSensorData").val(dataString);

            if (connected) {
                var message = new Paho.MQTT.Message(dataString);
                message.destinationName = $("#topicInput").val();
                client.send(message);
            }
        }

        function setDefaultValues() {
            $("#hostInput").val(urlParamOrDefault("host", "test.mosquitto.org"));
            $("#portInput").val(urlParamOrDefault("port", "8081"));
            $("#clientIdInput").val("bb-loc2mqtt-" + new Date().getTime());
            $("#topicInput").val(urlParamOrDefault("topic", "sensors2mqtt/default"));
            $("#keepAliveInput").val("60");
            $("#timeoutInput").val("3");
            $("#tlsInput").prop('checked', true);
            $("#cleanSessionInput").prop('checked', true);
        }

        $(window).on('load', function() {
            setDefaultValues();
            setSendInterval();
            $("#sendInterval").on("input", setSendInterval);
            
            $("#connectbutton").click(function() {
                if (!connected) connectToMqttBroker();
                else disconnectFromMqttBroker();
            });

            // Geolocation is usually allowed without extra button click (but needs HTTPS)
            if (navigator.geolocation) navigator.geolocation.watchPosition(updatePosition);
        });
    </script>
</head>

<body>
    <h1>{b} SensorData -> MQTT</h1>
    <div class="container-fluid">
        <form>
            <h3>MQTT Settings</h3>
            <div class="row">
                <div class="col-lg-5"><label>Host</label><input type="text" class="form-control" id="hostInput"></div>
                <div class="col-lg-2"><label>Port</label><input type="text" class="form-control" id="portInput"></div>
                <div class="col-lg-5"><label>Client ID</label><input type="text" class="form-control" id="clientIdInput"></div>
            </div>
            <div class="row mt-2">
                <div class="col-lg-3"><label>User</label><input type="text" class="form-control" id="userInput"></div>
                <div class="col-lg-3"><label>Pass</label><input type="password" class="form-control" id="passInput"></div>
                <div class="col-lg-2"><label>TLS</label><input type="checkbox" id="tlsInput"></div>
                <div class="col-lg-2"><label>Clean</label><input type="checkbox" id="cleanSessionInput"></div>
                <div class="col-lg-2"><button type="button" class="btn btn-primary btn-block" id="connectbutton">Connect</button></div>
            </div>

            <h3 class="mt-4">Sensor Settings</h3>
            <div class="row">
                <div class="col-lg-12">
                    <button type="button" id="sensorPermissionButton" class="btn btn-warning" onclick="requestSensorPermission()">
                        Enable Sensors (Required for iOS)
                    </button>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-3">
                    <label>Interval</label>
                    <input type="range" min="100" max="5000" value="1000" step="100" class="slider" id="sendInterval">
                    <p><span id="sendIntervalValue">1000</span> ms</p>
                </div>
                <div class="col-lg-2"><label>Accel</label><input type="checkbox" id="sendAccelerationData"></div>
                <div class="col-lg-2"><label>Orient</label><input type="checkbox" id="sendOrientationData"></div>
                <div class="col-lg-2"><label>GPS</label><input type="checkbox" id="sendGpsData"></div>
            </div>
            
            <div class="row mt-3">
                <div class="col-lg-6">
                    <label>Latest SensorData</label>
                    <textarea class="form-control" id="latestSensorData" rows="3" disabled></textarea>
                </div>
                <div class="col-lg-6">
                    <label>Log</label>
                    <textarea class="form-control" id="latestLog" rows="3" disabled></textarea>
                </div>
            </div>
        </form>
    </div>
    <p class="mt-4"> (c) 2020 - <a href="http://www.bytebang.at">bytebang e.U.</a></p>
</body>
</html>
